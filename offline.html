<!DOCTYPE html>
<html lang="de" class="dark">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Offline – Sing op Kölsch</title>
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body {
    background: #0d1117;
    color: #f1f5f9;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    display: flex; align-items: center; justify-content: center;
    padding: 24px; text-align: center;
  }
  .wrap { max-width: 360px; width: 100%; }
  .icon { width: 92px; height: 92px; margin: 0 auto 22px; display: block; }
  h1 { font-size: 1.45rem; font-weight: 800; margin: 0 0 10px; letter-spacing: -0.02em; }
  p { color: #94a3b8; font-size: 0.98rem; line-height: 1.5; margin: 0 0 24px; }
  .row { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
  .btn {
    font: inherit; font-weight: 600; cursor: pointer; text-decoration: none;
    border-radius: 12px; padding: 13px 22px; border: 1px solid transparent;
    display: inline-flex; align-items: center; gap: 7px;
  }
  .btn-primary {
    color: #fff; background: linear-gradient(135deg, #ef4444, #dc2626);
    box-shadow: 0 4px 14px rgba(220,38,38,0.35);
  }
  .btn-ghost {
    color: #e5e7eb; background: rgba(255,255,255,0.06);
    border-color: rgba(255,255,255,0.14);
  }
  .btn:active { transform: translateY(1px); }
  .reload { margin-top: 18px; font-size: 0.85rem; }
  .reload a { color: #f87171; text-decoration: none; cursor: pointer; }
  .hint { margin-top: 20px; font-size: 0.8rem; color: #64748b; }
</style>
</head>
<body>
  <div class="wrap">
    <svg class="icon" viewBox="0 0 1024 1024" aria-hidden="true">
      <defs>
        <linearGradient id="r" x1="0" y1="0" x2="1" y2="1">
          <stop offset="0" stop-color="#ef4444"/><stop offset=".35" stop-color="#dc2626"/>
          <stop offset=".7" stop-color="#b91c1c"/><stop offset="1" stop-color="#7f1d1d"/>
        </linearGradient>
      </defs>
      <g fill="url(#r)">
        <polygon points="512,360 470,520 554,520"/>
        <rect x="356" y="498" width="312" height="232" rx="6"/>
        <rect x="326" y="726" width="372" height="48" rx="12"/>
        <polygon points="398,236 356,520 440,520"/>
        <polygon points="626,236 582,520 668,520"/>
        <rect x="392" y="194" width="12" height="60"/><rect x="375" y="212" width="46" height="12"/>
        <rect x="620" y="194" width="12" height="60"/><rect x="603" y="212" width="46" height="12"/>
        <rect x="506" y="320" width="12" height="52"/><rect x="491" y="338" width="42" height="12"/>
      </g>
      <g fill="#0d1117">
        <path d="M512 598 q36 0 36 42 v92 h-72 v-92 q0-42 36-42 z"/>
        <path d="M430 614 q17 0 17 24 v50 h-34 v-50 q0-24 17-24 z"/>
        <path d="M594 614 q17 0 17 24 v50 h-34 v-50 q0-24 17-24 z"/>
      </g>
    </svg>
    <h1>Du bist offline</h1>
    <p>Diese Seite hast du noch nicht geöffnet. Die Startseite und bereits besuchte Lieder funktionieren auch ohne Internet.</p>
    <div class="row">
      <a class="btn btn-primary" href="/">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2h-4v-7h-6v7H5a2 2 0 0 1-2-2z"/></svg>
        Zur Startseite
      </a>
      <button class="btn btn-ghost" onclick="history.back()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
        Zurück
      </button>
    </div>
    <div class="reload"><a onclick="location.reload()">Erneut versuchen</a></div>
    <div class="hint">Sing op Kölsch</div>
  </div>
</body>
</html>
