name: Build IPA (iOS + Widget)

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
    timeout-minutes: 40
    defaults:
      run:
        working-directory: SingOpKoelsch-iOS

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 16
        run: |
          sudo xcode-select -s /Applications/Xcode.app
          xcodebuild -version
        working-directory: .

      - name: Install XcodeGen
        run: brew install xcodegen
        working-directory: .

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Archive (iOS + Widget, unsigned)
        run: |
          set -o pipefail
          xcodebuild \
            -scheme SingOpKoelsch \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -archivePath build/SingOpKoelsch.xcarchive \
            archive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            DEVELOPMENT_TEAM="" \
            SKIP_INSTALL=NO \
            2>&1 | grep -E "error:|Build |Compiling|Linking|Archive|FAILED|SUCCEEDED" \
                 | grep -v "^$" || true
          [ -d "build/SingOpKoelsch.xcarchive" ] || {
            echo "Archive missing — full log:"; xcodebuild \
              -scheme SingOpKoelsch -configuration Release \
              -destination "generic/platform=iOS" \
              -archivePath build/SingOpKoelsch.xcarchive archive \
              CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO \
              CODE_SIGNING_ALLOWED=NO DEVELOPMENT_TEAM="" SKIP_INSTALL=NO
          }

      - name: Package IPA
        run: |
          APP=$(find build/SingOpKoelsch.xcarchive/Products -name "*.app" | grep -v Watch | head -1)
          echo "App: $APP"
          mkdir -p build/ipa/Payload
          cp -r "$APP" build/ipa/Payload/
          cd build/ipa && zip -qr ../SingOpKoelsch.ipa Payload/
          echo "IPA: $(du -sh ../SingOpKoelsch.ipa | cut -f1)"
          unzip -l ../SingOpKoelsch.ipa | grep -E "\.appex|Assets\.car" | head -20
          unzip -l ../SingOpKoelsch.ipa | grep -i widget \
            && echo "✅ Widget INCLUDED" || echo "⚠️  Widget NOT found"

      - name: Upload IPA artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: SingOpKoelsch-v1.6-run${{ github.run_number }}
          path: SingOpKoelsch-iOS/build/SingOpKoelsch.ipa
          retention-days: 90

      - name: Deploy to singopkoelsch.de
        if: github.ref == 'refs/heads/main'
        working-directory: .
        env:
          DEPLOY_TOKEN: ${{ secrets.DEPLOY_TOKEN }}
        run: |
          if [ -z "$DEPLOY_TOKEN" ]; then
            echo "No DEPLOY_TOKEN — skipping deploy"
            exit 0
          fi
          curl -f -X POST \
            -H "X-Deploy-Token: $DEPLOY_TOKEN" \
            -F "ipa=@SingOpKoelsch-iOS/build/SingOpKoelsch.ipa" \
            https://singopkoelsch.de/app/deploy.php
          echo ""
          echo "✅ Live: https://singopkoelsch.de/app/SingOpKoelsch.ipa"
