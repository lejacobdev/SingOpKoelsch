name: Build IPA (iOS + Widget)

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
    timeout-minutes: 40
    defaults:
      run:
        working-directory: SingOpKoelsch-iOS

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 16
        run: |
          sudo xcode-select -s /Applications/Xcode.app
          xcodebuild -version
        working-directory: .

      - name: Install XcodeGen
        run: brew install xcodegen
        working-directory: .

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Archive (iOS + Widget, unsigned)
        run: |
          set -o pipefail
          xcodebuild \
            -scheme SingOpKoelsch \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -archivePath build/SingOpKoelsch.xcarchive \
            archive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            DEVELOPMENT_TEAM="" \
            SKIP_INSTALL=NO \
            2>&1 | grep -E "error:|Build |Compiling|Linking|Archive|FAILED|SUCCEEDED" \
                 | grep -v "^$" || true
          [ -d "build/SingOpKoelsch.xcarchive" ] || {
            echo "Archive missing — full log:"; xcodebuild \
              -scheme SingOpKoelsch -configuration Release \
              -destination "generic/platform=iOS" \
              -archivePath build/SingOpKoelsch.xcarchive archive \
              CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO \
              CODE_SIGNING_ALLOWED=NO DEVELOPMENT_TEAM="" SKIP_INSTALL=NO
          }

      - name: Package IPA
        run: |
          APP=$(find build/SingOpKoelsch.xcarchive/Products -name "*.app" | grep -v Watch | head -1)
          echo "App: $APP"
          mkdir -p build/ipa/Payload
          cp -r "$APP" build/ipa/Payload/
          cd build/ipa && zip -qr ../SingOpKoelsch.ipa Payload/
          echo "IPA: $(du -sh ../SingOpKoelsch.ipa | cut -f1)"
          unzip -l ../SingOpKoelsch.ipa | grep -E "\.appex|Assets\.car" | head -20
          unzip -l ../SingOpKoelsch.ipa | grep -i widget \
            && echo "✅ Widget INCLUDED" || echo "⚠️  Widget NOT found"

      - name: Upload IPA artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: SingOpKoelsch-v1.6-run${{ github.run_number }}
          path: SingOpKoelsch-iOS/build/SingOpKoelsch.ipa
          retention-days: 90

      - name: Deploy to singopkoelsch.de
        if: github.ref == 'refs/heads/main'
        working-directory: .
        env:
          DEPLOY_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
        run: |
          if [ -z "$DEPLOY_KEY" ]; then
            echo "No DEPLOY_SSH_KEY — skipping deploy"
            exit 0
          fi
          # Strip any whitespace/newlines from secrets
          HOST=$(printf '%s' "$DEPLOY_HOST" | tr -d '\r\n\t ')
          echo "$DEPLOY_KEY" > /tmp/dk && chmod 600 /tmp/dk
          IPA_SIZE=$(wc -c < SingOpKoelsch-iOS/build/SingOpKoelsch.ipa | tr -d ' ')
          scp -i /tmp/dk -o StrictHostKeyChecking=no \
            SingOpKoelsch-iOS/build/SingOpKoelsch.ipa \
            "${HOST}:/var/www/html8/app/SingOpKoelsch.ipa"
          ssh -i /tmp/dk -o StrictHostKeyChecking=no "$HOST" \
            "/var/www/html8/scripts/deploy_ipa.sh $IPA_SIZE"
          rm /tmp/dk
          echo "✅ Live: https://singopkoelsch.de/app/SingOpKoelsch.ipa"
