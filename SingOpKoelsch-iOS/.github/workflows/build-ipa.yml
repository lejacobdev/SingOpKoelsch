name: Build IPA (iOS + Widget)

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
    timeout-minutes: 40

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 16
        run: |
          sudo xcode-select -s /Applications/Xcode.app
          xcodebuild -version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Archive (iOS + Widget, unsigned)
        run: |
          set -o pipefail
          xcodebuild \
            -scheme SingOpKoelsch \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -archivePath build/SingOpKoelsch.xcarchive \
            archive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            DEVELOPMENT_TEAM="" \
            SKIP_INSTALL=NO \
            2>&1 | grep -E "error:|warning:|Build|Compiling|Linking|Archive" | grep -v "note:" || true
          # Re-run without filter if archive not created
          if [ ! -d "build/SingOpKoelsch.xcarchive" ]; then
            xcodebuild \
              -scheme SingOpKoelsch \
              -configuration Release \
              -destination "generic/platform=iOS" \
              -archivePath build/SingOpKoelsch.xcarchive \
              archive \
              CODE_SIGN_IDENTITY="" \
              CODE_SIGNING_REQUIRED=NO \
              CODE_SIGNING_ALLOWED=NO \
              DEVELOPMENT_TEAM="" \
              SKIP_INSTALL=NO
          fi

      - name: Package IPA
        run: |
          APP=$(find build/SingOpKoelsch.xcarchive/Products -name "*.app" | grep -v Watch | head -1)
          echo "App bundle: $APP"
          mkdir -p build/ipa/Payload
          cp -r "$APP" build/ipa/Payload/
          cd build/ipa && zip -qr ../SingOpKoelsch.ipa Payload/
          echo "IPA: $(du -sh ../SingOpKoelsch.ipa | cut -f1)"
          echo ""
          echo "Key contents:"
          unzip -l ../SingOpKoelsch.ipa | grep -E "\.appex|AppIcon|Assets\.car" | head -20
          echo ""
          unzip -l ../SingOpKoelsch.ipa | grep -i widget \
            && echo "✅ Widget INCLUDED" \
            || echo "⚠️  Widget NOT found in IPA"

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: SingOpKoelsch-v1.6-run${{ github.run_number }}
          path: build/SingOpKoelsch.ipa
          retention-days: 90
